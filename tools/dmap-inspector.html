      }

      if (state.view.type === "frame") {
        return tryPatchFrameView(state.snapshot);
      }

      if (state.view.type === "map") {
        return tryPatchMapView(state.snapshot);
      }

      if (state.view.type === "table") {
        return tryPatchTableView(getRequiredTable(state.snapshot, state.view.name));
      }

      if (state.view.type === "layer") {
        return tryPatchLayerView(getRequiredLayer(state.snapshot, state.view.name));
      }

      if (state.view.type === "store") {
        return tryPatchStoreView(getRequiredStore(state.snapshot, state.view.name));
      }

      return false;
    }

    function tryPatchSummaryView(snapshot) {
      const summaryView = mainPanel.querySelector('[data-summary-view="1"]');
      if (!summaryView) {
        return false;
      }

      const overviewGrid = summaryView.querySelector('[data-summary-grid="overview"]');
      const modelingGrid = summaryView.querySelector('[data-summary-grid="modeling"]');
      if (!overviewGrid || !modelingGrid) {
        return false;
      }

      overviewGrid.innerHTML = renderSummaryOverviewGrid(snapshot);
      modelingGrid.innerHTML = renderSummaryModelingGrid(snapshot);

      const timelineGrid = summaryView.querySelector('[data-summary-grid="timeline"]');
      if (timelineGrid) {
        timelineGrid.innerHTML = renderSummaryTimelineGrid(snapshot);
      }

      return true;
    }

    function tryPatchGlobalsView(snapshot) {
      const globalsView = mainPanel.querySelector('[data-globals-view="1"]');
      if (!globalsView) {
        return false;
      }

      const globalsBody = globalsView.querySelector('[data-globals-body]');
      if (!globalsBody) {
        return false;
      }

      globalsBody.innerHTML = renderGlobalsRows(snapshot);
      return true;
    }

    function tryPatchFrameView(snapshot) {
      const frameView = mainPanel.querySelector('[data-frame-view="1"]');
      if (!frameView || !snapshot.frameRecord) {
        return false;
      }

      const ui = getFrameUi();
      const selectedCommand = resolveSelectedFrameCommand(snapshot.frameRecord, ui);
      patchText(frameView.querySelector('[data-frame-stat="commands"]'), `${snapshot.frameRecord.commandCount} commands`);
      patchText(frameView.querySelector('[data-frame-stat="tables"]'), `${snapshot.frameRecord.summary.changedTables.length} tables`);
      patchText(frameView.querySelector('[data-frame-stat="layers"]'), `${snapshot.frameRecord.summary.changedLayers.length} layers`);
      patchText(frameView.querySelector('[data-frame-stat="indices"]'), `${snapshot.frameRecord.summary.changedIndices.length} indices`);

      const frameBody = frameView.querySelector('[data-frame-body]');
      const frameDetail = frameView.querySelector('[data-frame-detail]');
      const frameMetrics = frameView.querySelector('[data-frame-metrics]');
      if (!frameBody || !frameDetail || !frameMetrics) {
        return false;
      }

      frameMetrics.innerHTML = renderFrameMetrics(snapshot.frameRecord);
      frameBody.innerHTML = renderFrameCommandRows(snapshot.frameRecord.commands, selectedCommand);
      frameDetail.innerHTML = renderFrameSummaryCard(snapshot.frameRecord);
      bindFrameCommandSelection();
      return true;
    }

    function tryPatchTableView(table) {
      const tableView = mainPanel.querySelector("[data-table-view]");
      if (!tableView || tableView.dataset.tableView !== table.name) {
        return false;
      }

      const ui = getTableUi(table.name);
      const filteredRows = buildFilteredTableRows(table, ui);
      const selectedRow = resolveSelectedTableRow(table, ui, filteredRows);
      const pageCount = Math.max(1, Math.ceil(filteredRows.length / ui.pageSize));
      ui.page = Math.min(ui.page, pageCount - 1);
      const start = ui.page * ui.pageSize;
      const pageRows = filteredRows.slice(start, start + ui.pageSize);

      patchText(tableView.querySelector('[data-table-stat="live"]'), `${table.existingCount} live`);
      patchText(tableView.querySelector('[data-table-stat="deleted"]'), `${table.highWater - table.existingCount} deleted`);
      patchText(tableView.querySelector('[data-table-stat="columns"]'), `${table.columns.length} columns`);
      patchText(tableView.querySelector('[data-table-stat="derived"]'), `${table.derivedColumnCount} derived`);
      patchText(tableView.querySelector('[data-table-stat="free"]'), `${table.freeRowIds.length} free ids`);
      patchText(
        tableView.querySelector("[data-table-footer]"),
        renderTableFooter(filteredRows.length, start, pageRows.length, ui.page, pageCount, table).replace(/\s+/g, " ").trim()
      );

      const prevPageButton = document.getElementById("prevPage");
      const nextPageButton = document.getElementById("nextPage");
      if (prevPageButton) {
        prevPageButton.disabled = ui.page === 0;
      }
      if (nextPageButton) {
        nextPageButton.disabled = ui.page >= pageCount - 1;
      }

      const tbody = tableView.querySelector("[data-table-body]");
      if (!tbody) {
        return false;
      }

      const currentRows = Array.from(tbody.querySelectorAll("[data-table-row]"));
      const hasSameRowOrder =
        currentRows.length === pageRows.length &&
        currentRows.every((rowElement, index) => Number(rowElement.dataset.tableRow) === pageRows[index].rowId);

      if (!hasSameRowOrder) {
        tbody.innerHTML = renderTableBody(table, pageRows, selectedRow);
        bindTableRowSelection(table.name);
        return true;
      }

      if (pageRows.length === 0) {
        tbody.innerHTML = renderTableBody(table, pageRows, selectedRow);
        return true;
      }

      currentRows.forEach((rowElement, rowIndex) => {
        const row = pageRows[rowIndex];
        const isSelected = selectedRow && selectedRow.rowId === row.rowId;
        rowElement.className = `${row.exists ? "" : "deleted"} ${isSelected ? "selected-row" : ""}`.trim();
        rowElement.style.cursor = "pointer";

        const cells = rowElement.children;
        if (cells[1]) {
          cells[1].innerHTML = row.exists ? `<span class="badge ok">Live</span>` : `<span class="badge warn">Deleted</span>`;
        }

        row.values.forEach((value, valueIndex) => {
          const cell = cells[valueIndex + 2];
          if (!cell) {
            return;
          }
          const column = table.columns[valueIndex];
          const classes = [];
          const valueClass = getTableValueCellClassName(value);
          if (valueClass) {
            classes.push(valueClass);
          }
          if (column.isDerived) {
            classes.push("derived-cell");
            cell.title = getDerivedColumnMetaText(column);
          } else {
            cell.removeAttribute("title");
          }
          cell.className = classes.join(" ");
          cell.innerHTML = renderTableValueCellInner(value);
        });
      });

      return true;
    }

    function tryPatchMapView(snapshot) {
      const mapView = mainPanel.querySelector('[data-map-view="1"]');
      if (!mapView) {
        return false;
      }

      const ui = getMapUi(snapshot);
      const canvas = document.getElementById("mapCanvas");
      if (!canvas) {
        return false;
      }
      const construction = getConstructionSnapshot(snapshot);

      patchText(mapView.querySelector('[data-map-stat="grid"]'), `${snapshot.width} x ${snapshot.height}`);
      patchText(mapView.querySelector('[data-map-stat="layers"]'), `${snapshot.layers.filter((layer) => ui.layerVisibility[layer.name]).length} visible layers`);
      patchText(mapView.querySelector('[data-map-stat="stores"]'), `${snapshot.stores.filter((store) => ui.storeVisibility[store.name]).length} visible stores`);
      patchText(mapView.querySelector('[data-map-stat="construction"]'), construction.active ? `${construction.active.name} ${construction.active.statusLabel} ${formatConstructionProgress(construction.active)}` : "All construction complete");
      patchText(mapView.querySelector('[data-map-stat="pending"]'), `${construction.pendingCount} pending sites`);
      patchText(mapView.querySelector("[data-map-cell-label]"), `Cell (${ui.x}, ${ui.y})`);

      drawCompositeMapPreview(canvas, snapshot, ui);

      mapView.querySelectorAll("[data-map-item-name]").forEach((row) => {
        const name = row.dataset.mapItemName;
        const itemType = row.dataset.mapItemType;
        const actualVisible = itemType === "overlay"
          ? ui.overlayVisibility[name === "constructionOverlay" ? "construction" : name]
          : itemType === "layer"
            ? ui.layerVisibility[name]
            : ui.storeVisibility[name];
        row.classList.toggle("hidden", !actualVisible);

        const visibilityEl = row.querySelector(".map-layer-visibility");
        if (visibilityEl) {
          visibilityEl.textContent = actualVisible ? "Shown" : "Hidden";
        }

        const toggle = row.querySelector("[data-map-toggle]");
        if (toggle) {
          toggle.checked = Boolean(actualVisible);
        }

        const meta = row.querySelector("[data-map-meta]");
        if (meta) {
          if (itemType === "layer") {
            const layer = getRequiredLayer(snapshot, name);
            meta.textContent = layer.summaryText;
          } else if (itemType === "store") {
            const store = getRequiredStore(snapshot, name);
            meta.textContent = `${store.nonEmptyEntries.length} active paths`;
          } else {
            meta.textContent = construction.active ? `${construction.active.name} | ${formatConstructionMaterials(construction.active)}` : "No active site";
          }
        }

        const transparencyButton = row.querySelector("[data-map-transparency]");
        if (transparencyButton && itemType === "layer") {
          const transparentZero = Boolean(ui.layerTransparency[name]);
          transparencyButton.classList.toggle("active", transparentZero);
          transparencyButton.textContent = transparentZero ? "Zero Transparent" : "Opaque Zero";
        }

        row.querySelectorAll("[data-map-color]").forEach((input) => {
          if (itemType !== "layer") {
            return;
          }
          const edge = input.dataset.mapColor;
          const ramp = ui.layerColorRamp[name];
          if (ramp && edge && ramp[edge]) {
            input.value = ramp[edge];
          }
        });
      });

      return true;
    }

    function tryPatchLayerView(layer) {
      const canvas = document.getElementById("layerCanvas");
      if (!canvas) {
        return false;
      }

      const ui = getLayerUi(layer.name);
      const x = clamp(ui.x, 0, Math.max(0, state.snapshot.width - 1));
      const y = clamp(ui.y, 0, Math.max(0, state.snapshot.height - 1));
      ui.x = x;
      ui.y = y;
      drawLayerPreview(canvas, layer, x, y);
      return true;
    }

    function tryPatchStoreView(store) {
      const storeView = mainPanel.querySelector("[data-store-view]");
      if (!storeView || storeView.dataset.storeView !== store.name) {
        return false;
      }

      const ui = getStoreUi(store.name);
      const entries = ui.showEmpty ? store.entries : store.nonEmptyEntries;
      const filtered = entries.filter((entry) => ui.rowIdFilter === "" || entry.rowId === Number(ui.rowIdFilter));
      const selectedEntry = filtered.find((entry) => entry.rowId === ui.selectedRowId) || filtered[0] || null;

      patchText(storeView.querySelector('[data-store-stat="kind"]'), store.kindLabel);
      patchText(storeView.querySelector('[data-store-stat="slots"]'), `${store.slotCount} slots`);
      patchText(storeView.querySelector('[data-store-stat="active"]'), `${store.nonEmptyEntries.length} active paths`);

      const storeBody = storeView.querySelector("[data-store-body]");
      const storeDetail = storeView.querySelector("[data-store-detail]");
      if (!storeBody || !storeDetail) {
        return false;
      }

      storeBody.innerHTML = renderStoreRows(filtered, selectedEntry, state.snapshot.width);
      storeDetail.innerHTML = renderStoreDetail(selectedEntry, state.snapshot.width);
      bindStoreRowSelection(store.name);
      return true;
    }

    function patchText(element, value) {
      if (!element) {
        return;
      }
      element.textContent = value;
    }

    function setTimelineFrame(index) {
      if (!state.timeline) {
        return;
      }
      stopTimelinePlayback();
      const nextIndex = clamp(index, 0, state.timeline.frames.length - 1);
      state.timeline.currentIndex = nextIndex;
      state.snapshot = state.timeline.frames[nextIndex];
      renderFrameChange();
    }

    function syncTimelinePlayback() {
      if (!state.timeline) {
        return;
      }

      if (state.timeline.timerId !== null) {
        window.clearInterval(state.timeline.timerId);
        state.timeline.timerId = null;
      }

      if (!state.timeline.isPlaying) {
        return;
      }

      state.timeline.timerId = window.setInterval(() => {
        if (!state.timeline) {
          return;
        }

        const lastIndex = state.timeline.frames.length - 1;
        if (state.timeline.currentIndex >= lastIndex) {
          if (!state.timeline.loop) {
            stopTimelinePlayback();
            renderFrameChange();
            return;
          }
          state.timeline.currentIndex = 0;
        } else {
          state.timeline.currentIndex += 1;
        }

        state.snapshot = state.timeline.frames[state.timeline.currentIndex];
        renderFrameChange();
      }, state.timeline.playbackMs);
    }

    function stopTimelinePlayback() {
      if (!state.timeline) {
        return;
      }
      state.timeline.isPlaying = false;
      if (state.timeline.timerId !== null) {
        window.clearInterval(state.timeline.timerId);
        state.timeline.timerId = null;
      }
    }

    function resetUiCaches() {
      state.mapUi = null;
      state.tableUi = {};
      state.layerUi = {};
      state.storeUi = {};
      state.frameUi = null;
    }

    function normalizeViewForSnapshot() {
      const snapshot = state.snapshot;
      if (!snapshot) {
        state.view = { type: "summary" };
        return;
      }

      if (state.view.type === "table" && !snapshot.tables.some((table) => table.name === state.view.name)) {
        state.view = { type: "summary" };
      } else if (state.view.type === "layer" && !snapshot.layers.some((layer) => layer.name === state.view.name)) {
        state.view = { type: "summary" };
      } else if (state.view.type === "store" && !snapshot.stores.some((store) => store.name === state.view.name)) {
        state.view = { type: "summary" };
      }
    }

    function finalizeTimelineFrames(frames) {
      const collator = new Intl.Collator(undefined, { numeric: true, sensitivity: "base" });
      const sorted = [...frames].sort((left, right) => {
        if (left.tick < right.tick) return -1;
        if (left.tick > right.tick) return 1;
        return collator.compare(left.fileName, right.fileName);
      });
      const hasTickSequence = sorted.some((frame) => /^tick-\d+\.dmap$/i.test(baseName(frame.fileName)));
      const finalized = hasTickSequence
        ? sorted.filter((frame) => baseName(frame.fileName).toLowerCase() !== "latest.dmap")
        : sorted;
      for (let index = 0; index < finalized.length; index++) {
        finalized[index].stateMatchesPrevious = index > 0 && finalized[index].stateHashHex === finalized[index - 1].stateHashHex;
      }
      return finalized;
    }

    function describeFileSetSource(files) {
      const fileWithPath = files.find((file) => file.webkitRelativePath);
      if (fileWithPath && fileWithPath.webkitRelativePath) {
        return fileWithPath.webkitRelativePath.split("/")[0] || "Selected folder";
      }
      return files.length === 1 ? files[0].name : `${files.length} dropped files`;
    }

    function isSnapshotFile(fileName) {
      return /\.dmap$/i.test(fileName);
    }

    function summarizeByteArray(values, cellCount) {
      let min = 255;
      let max = 0;
      let nonZero = 0;
      for (let i = 0; i < cellCount && i < values.length; i++) {
        const value = values[i];
        if (value < min) min = value;
        if (value > max) max = value;
        if (value !== 0) nonZero++;
      }
      return { min, max, nonZero };
    }

    function summarizeIntArray(values, cellCount) {
      let min = Number.POSITIVE_INFINITY;
      let max = Number.NEGATIVE_INFINITY;
      for (let i = 0; i < cellCount && i < values.length; i++) {
        const value = values[i];
        if (value < min) min = value;
        if (value > max) max = value;
      }
      return {
        min: Number.isFinite(min) ? min : 0,
        max: Number.isFinite(max) ? max : 0,
      };
    }

    function summarizeFix64Array(values, cellCount) {
      let min = LONG_MAX;
      let max = -LONG_MAX;
      for (let i = 0; i < cellCount && i < values.length; i++) {
        const value = values[i];
        if (value < min) min = value;
        if (value > max) max = value;
      }
      return { min, max };
    }

    function findArrayMax(values) {
      let max = 0;
      for (let i = 0; i < values.length; i++) {
        if (values[i] > max) {
          max = values[i];
        }
      }
      return max;
    }

    function readBit(words, cellIndex) {
      const wordIndex = cellIndex >> 6;
      const bitIndex = BigInt(cellIndex & 63);
      return wordIndex < words.length && ((words[wordIndex] >> bitIndex) & 1n) === 1n;
    }

    function colorRamp(t, start, end) {
      const clamped = clamp(t, 0, 1);
      return [
        Math.round(start[0] + (end[0] - start[0]) * clamped),
        Math.round(start[1] + (end[1] - start[1]) * clamped),
        Math.round(start[2] + (end[2] - start[2]) * clamped),
      ];
    }

    function colorRampBigInt(t, start, end) {
      return colorRamp(Number(t), start, end);
    }

    function normalize(value, min, max) {
      if (max === min) return 0;
      return (value - min) / (max - min);
    }

    function normalizeBigInt(value, min, max) {
      if (max === min) return 0;
      const numerator = Number(value - min);
      const denominator = Number(max - min);
      if (!Number.isFinite(numerator) || !Number.isFinite(denominator) || denominator === 0) return 0;
      return numerator / denominator;
    }

    function formatFix64(rawValue) {
      if (rawValue === LONG_MAX) {
        return "Infinity sentinel";
      }
      const negative = rawValue < 0n;
      const absValue = negative ? -rawValue : rawValue;
      const whole = absValue / FIX64_SCALE;
      const fraction = absValue % FIX64_SCALE;
      return `${negative ? "-" : ""}${whole}.${fraction.toString().padStart(2, "0")}`;
    }

    function formatBigInt(value) {
      return value.toString();
    }

    function formatShortStateHash(value) {
      if (!value) {
        return "Computing...";
      }
      return value.length > 16 ? `${value.slice(0, 16)}…` : value;
    }

    function describeStateChange(snapshot, isFirstFrame) {
      if (!snapshot || !snapshot.stateHashHex) {
        return "Computing state hash";
      }
      if (isFirstFrame) {
        return "Reference frame";
      }
      return snapshot.stateMatchesPrevious ? "Same as previous frame" : "Changed from previous frame";
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, Number(value)));
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    async function computeSnapshotStateHashHex(buffer, tickOffset, stateEndOffset) {
      const bytes = new Uint8Array(buffer.slice(0, stateEndOffset));
      for (let i = 0; i < 8; i++) {
        bytes[tickOffset + i] = 0;
      }

      if (globalThis.crypto && globalThis.crypto.subtle) {
        const digest = await globalThis.crypto.subtle.digest("SHA-256", bytes);
        return bytesToHex(new Uint8Array(digest));
      }

      return computeFnv1a64Hex(bytes);
    }

    function bytesToHex(bytes) {
      return Array.from(bytes, (value) => value.toString(16).padStart(2, "0")).join("");
    }

    function computeFnv1a64Hex(bytes) {
      let hash = 0xcbf29ce484222325n;
      const prime = 0x100000001b3n;
      const mask = 0xffffffffffffffffn;
      for (const value of bytes) {
        hash ^= BigInt(value);
        hash = (hash * prime) & mask;
      }
      return hash.toString(16).padStart(16, "0");
    }

    function baseName(path) {
      const parts = String(path).split(/[\\/]/);
      return parts[parts.length - 1] || path;
    }

    class BinaryCursor {
      constructor(buffer) {
        this.buffer = buffer;
        this.view = new DataView(buffer);
        this.offset = 0;
        this.decoder = new TextDecoder("utf-8");
      }

      readByte() {
        const value = this.view.getUint8(this.offset);
        this.offset += 1;
        return value;
      }

      readBoolean() {
        return this.readByte() !== 0;
      }

      readUInt16() {
        const value = this.view.getUint16(this.offset, true);
        this.offset += 2;
        return value;
      }

      readInt32() {
        const value = this.view.getInt32(this.offset, true);
        this.offset += 4;
        return value;
      }

      readUInt64() {
        const value = this.view.getBigUint64(this.offset, true);
        this.offset += 8;
        return value;
      }

      readInt64() {
        const value = this.view.getBigInt64(this.offset, true);
        this.offset += 8;
        return value;
      }

      readString() {
        const byteLength = this.read7BitEncodedInt();
        const bytes = new Uint8Array(this.buffer, this.offset, byteLength);
        this.offset += byteLength;
        return this.decoder.decode(bytes);
      }

      read7BitEncodedInt() {
        let count = 0;
        let shift = 0;
        let byte = 0;
        do {
          byte = this.readByte();
          count |= (byte & 0x7f) << shift;
          shift += 7;
        } while ((byte & 0x80) !== 0);
        return count;
      }

      readUint8Array(length) {
        const bytes = new Uint8Array(this.buffer.slice(this.offset, this.offset + length));
        this.offset += length;
        return bytes;
      }

      readInt32Array(length) {
        const values = new Int32Array(length);
        for (let i = 0; i < length; i++) {
          values[i] = this.readInt32();
        }
        return values;
      }

      readInt64Array(length) {
        const values = new Array(length);
        for (let i = 0; i < length; i++) {
          values[i] = this.readInt64();
        }
        return values;
      }

      readUInt64Array(length) {
        const values = new Array(length);
        for (let i = 0; i < length; i++) {
          values[i] = this.readUInt64();
        }
        return values;
      }

      isAtEnd() {
        return this.offset === this.buffer.byteLength;
      }

      remainingBytes() {
        return this.buffer.byteLength - this.offset;
      }
    }

    window.DetMapInspector = {
      parseSnapshot,
      computeSnapshotStateHashHex,
      finalizeTimelineFrames,
      describeFileSetSource,
      isSnapshotFile,
    };
  </script>
</body>
</html>
